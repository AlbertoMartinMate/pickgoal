services:
  - type: web
    name: pickgoal-backend
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn run:app
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: pickgoal-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: FOOTBALL_API_KEY
        sync: false
      - key: FLASK_ENV
        value: production
      - key: FRONTEND_URL
        sync: false

databases:
  - name: pickgoal-db
    databaseName: pickgoal
    plan: free
